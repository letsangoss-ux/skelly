<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>La Team Skelly — Édition privée</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ÉTAPE 1 : je rejoins ou j'anime -->
  <div id="screen-role" class="screen">
    <div class="home-wrap">
      <header class="home-header">
        <div class="logo-mark home-logo">S</div>
        <div class="eyebrow">Édition privée</div>
        <h1 class="title-xl home-title">La Team Skelly</h1>
        <p class="home-tagline">Skelly, skelly, skeleton. GO !</p>
      </header>

      <div class="home-role-choice">
        <button class="home-btn-primary home-btn-big" id="btn-role-player">Rejoindre une partie</button>
        <button class="home-btn-link" id="btn-role-host">Je suis l'animateur →</button>
      </div>

      <footer class="home-footer">
        <span>La Team Skelly — Édition privée</span>
        <a href="/admin.html">Administration →</a>
      </footer>
    </div>
  </div>

  <!-- ÉTAPE 2 : quel jeu ? -->
  <div id="screen-games" class="screen hidden">
    <div class="home-wrap">
      <header class="home-header">
        <div class="eyebrow" id="games-eyebrow">Choisis ton jeu</div>
        <h1 class="title-xl home-title" style="font-size:2.1rem;">Au programme</h1>
      </header>

      <nav class="home-game-list" id="game-list" aria-label="Choix du jeu">
        <a class="home-game-row" data-player="/player.html" data-host="/host.html">
          <span class="home-game-num">I</span>
          <span class="home-game-label">Quiz</span>
          <span class="home-game-arrow">→</span>
        </a>
        <a class="home-game-row" data-player="/impostor-player.html" data-host="/impostor-host.html">
          <span class="home-game-num">II</span>
          <span class="home-game-label">Imposteur</span>
          <span class="home-game-arrow">→</span>
        </a>
        <a class="home-game-row" data-player="/resiliance-player.html" data-host="/resiliance-host.html">
          <span class="home-game-num">III</span>
          <span class="home-game-label">Le jeu des problèmes</span>
          <span class="home-game-arrow">→</span>
        </a>
        <a class="home-game-row" data-player="/truth-player.html" data-host="/truth-host.html">
          <span class="home-game-num">IV</span>
          <span class="home-game-label">Vrai du faux</span>
          <span class="home-game-arrow">→</span>
        </a>
        <a class="home-game-row" data-player="/draw-player.html" data-host="/draw-host.html">
          <span class="home-game-num">V</span>
          <span class="home-game-label">Skelly's Drawing</span>
          <span class="home-game-arrow">→</span>
        </a>
      </nav>

      <footer class="home-footer">
        <button class="home-back-link" id="btn-back-role">← Retour</button>
        <a href="/admin.html">Administration →</a>
      </footer>
    </div>
  </div>

  <script>
    const screenRole = document.getElementById('screen-role');
    const screenGames = document.getElementById('screen-games');
    const gamesEyebrow = document.getElementById('games-eyebrow');
    let role = 'player';

    function goToGames(chosenRole) {
      role = chosenRole;
      gamesEyebrow.textContent = chosenRole === 'host' ? "Choisis ton jeu — animateur" : 'Choisis ton jeu';
      screenRole.classList.add('hidden');
      screenGames.classList.remove('hidden');
    }

    document.getElementById('btn-role-player').addEventListener('click', () => goToGames('player'));
    document.getElementById('btn-role-host').addEventListener('click', () => goToGames('host'));
    document.getElementById('btn-back-role').addEventListener('click', () => {
      screenGames.classList.add('hidden');
      screenRole.classList.remove('hidden');
    });

    document.querySelectorAll('.home-game-row').forEach((row) => {
      row.addEventListener('click', () => {
        window.location.href = role === 'host' ? row.dataset.host : row.dataset.player;
      });
    });
  </script>
</body>
</html>
