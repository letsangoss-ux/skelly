<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>La Team Skelly</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="screen">
    <div class="card" style="text-align:center; max-width:540px;">
      <div class="logo-mark" style="margin:0 auto 18px;">S</div>
      <div class="eyebrow">La Team Skelly</div>
      <h1 class="title-xl">Espace de jeu</h1>
      <p class="subtitle">Choisissez à quoi vous voulez jouer.</p>

      <div style="margin-top:32px; text-align:left;">
        <div class="eyebrow" style="margin-bottom:10px;">❔ Quizz</div>
        <div class="btn-row" style="margin-top:0;">
          <button class="btn btn-primary" onclick="window.location.href='/player.html'">Rejoindre une partie</button>
          <button class="btn btn-ghost" onclick="window.location.href='/host.html'">Animateur</button>
        </div>
      </div>

      <div style="margin-top:32px; text-align:left;">
        <div class="eyebrow" style="margin-bottom:10px;">🎭 Imposteur</div>
        <div class="btn-row" style="margin-top:0;">
          <button class="btn btn-primary" onclick="window.location.href='/impostor-player.html'">Rejoindre une partie</button>
          <button class="btn btn-ghost" onclick="window.location.href='/impostor-host.html'">Animateur</button>
        </div>
      </div>

      <p class="subtitle" style="margin-top:28px;"><a href="/admin.html" style="color:var(--gold);">Admin →</a></p>
    </div>
  </div>
</body>
</html>
