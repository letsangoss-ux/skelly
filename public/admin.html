<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tableau de bord — Le Quiz des Sacs</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div id="screen-login" class="screen">
    <div class="card" style="text-align:center;">
      <div class="eyebrow">Accès réservé</div>
      <h1 class="title-xl">Tableau de bord</h1>
      <div class="field" style="text-align:left;">
        <label for="input-password">Mot de passe administrateur</label>
        <input type="text" id="input-password" placeholder="••••••••" autocomplete="off">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-login">Se connecter</button>
      </div>
      <div class="error-msg" id="login-error"></div>
    </div>
  </div>

  <div id="screen-dashboard" class="screen hidden">
    <div class="admin-shell">
      <div class="admin-header">
        <div>
          <div class="eyebrow">Tableau de bord</div>
          <h1 class="title-xl">Mes quiz</h1>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-ghost" id="btn-show-history" style="width:auto;">Historique des parties</button>
          <button class="btn btn-primary" id="btn-new-quiz" style="width:auto;">+ Nouveau quiz</button>
        </div>
      </div>
      <div id="quiz-list" class="quiz-list"></div>
    </div>
  </div>

  <div id="screen-history" class="screen hidden">
    <div class="admin-shell">
      <div class="admin-header">
        <div>
          <div class="eyebrow">Historique</div>
          <h1 class="title-xl">Parties jouées</h1>
        </div>
        <button class="btn btn-ghost" id="btn-back-dashboard" style="width:auto;">← Retour</button>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <div id="screen-editor" class="screen hidden">
    <div class="admin-shell">
      <div class="admin-header">
        <div>
          <div class="eyebrow">Éditeur</div>
          <h1 class="title-xl" id="editor-title">Nouveau quiz</h1>
        </div>
        <button class="btn btn-ghost" id="btn-cancel-edit" style="width:auto;">← Annuler</button>
      </div>

      <div class="field">
        <label for="quiz-title-input">Titre du quiz</label>
        <input type="text" id="quiz-title-input" placeholder="Ex : Spécial sacs — Live du 12 juillet">
      </div>

      <div class="field">
        <label>Musique de fond (optionnel)</label>
        <div id="music-current" class="hidden" style="margin-bottom:10px;">
          <audio id="music-preview" controls style="width:100%;"></audio>
          <button class="icon-btn" id="btn-remove-music">✕ Retirer la musique</button>
        </div>
        <label class="qc-upload-label" style="display:inline-block;width:auto;padding:10px 18px;">
          <input type="file" id="music-upload-input" accept="audio/*" class="hidden">
          <span>Choisir un fichier audio (mp3, m4a...)</span>
        </label>
      </div>

      <h3 style="margin-top:30px;">Questions</h3>
      <div id="questions-list"></div>
      <button class="btn btn-ghost" id="btn-add-question" style="margin-top:14px;">+ Ajouter une question</button>

      <div class="host-controls" style="justify-content:flex-start; margin-top:36px;">
        <button class="btn btn-primary" id="btn-save-quiz" style="width:auto;">Enregistrer le quiz</button>
      </div>
      <div class="error-msg" id="editor-error"></div>
    </div>
  </div>

  <template id="question-card-template">
    <div class="question-card">
      <div class="qc-header">
        <span class="qc-number"></span>
        <button class="icon-btn qc-remove" title="Supprimer la question">✕</button>
      </div>
      <div class="qc-body">
        <div class="qc-photo-zone">
          <img class="qc-photo-preview hidden">
          <label class="qc-upload-label">
            <input type="file" accept="image/*" class="qc-photo-input hidden">
            <span>Photo (Optionnelle)</span>
          </label>
        </div>
        <div class="qc-fields">
          <div class="field">
            <label>Texte de la question</label>
            <textarea class="qc-text" placeholder="Posez votre question ici..." style="width:100%; height:60px; border-radius:12px; padding:10px; background:rgba(0,0,0,0.25); color:var(--cream); border:1px solid rgba(248,243,234,0.2);"></textarea>
          </div>
          
          <label style="margin-top:20px; display:block; font-size:0.75rem; text-transform:uppercase; color:var(--cream-dim);">Réponses (Cochez la ou les bonnes réponses)</label>
          <div class="field" style="display:flex; gap:10px; align-items:center; margin-top:8px;">
            <input type="checkbox" class="qc-chk qc-chk-0" checked>
            <input type="text" class="qc-ans qc-ans-0" placeholder="Réponse 1">
          </div>
          <div class="field" style="display:flex; gap:10px; align-items:center; margin-top:8px;">
            <input type="checkbox" class="qc-chk qc-chk-1">
            <input type="text" class="qc-ans qc-ans-1" placeholder="Réponse 2">
          </div>
          <div class="field" style="display:flex; gap:10px; align-items:center; margin-top:8px;">
            <input type="checkbox" class="qc-chk qc-chk-2">
            <input type="text" class="qc-ans qc-ans-2" placeholder="Réponse 3">
          </div>
          <div class="field" style="display:flex; gap:10px; align-items:center; margin-top:8px;">
            <input type="checkbox" class="qc-chk qc-chk-3">
            <input type="text" class="qc-ans qc-ans-3" placeholder="Réponse 4">
          </div>

          <div style="display:flex; gap:14px; margin-top: 15px;">
            <div class="field" style="flex:1;">
              <label>Temps (secondes)</label>
              <input type="text" class="qc-duration" placeholder="20">
            </div>
            <div class="field" style="flex:1;">
              <label>Points</label>
              <input type="text" class="qc-points" placeholder="1000">
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <script src="/js/admin.js"></script>
</body>
</html>
